<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Music Studio</title>

<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

header{
text-align:center;
padding:25px;
font-size:28px;
font-weight:bold;
letter-spacing:1px;
}

.studio{
max-width:1200px;
margin:auto;
padding:30px;
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

.panel{
background:rgba(255,255,255,0.08);
padding:25px;
border-radius:14px;
backdrop-filter:blur(8px);
}

.panel h2{
margin-top:0;
}

/* PIANO */

.piano{
display:flex;
position:relative;
height:200px;
user-select:none;
}

.key{
width:60px;
height:200px;
background:white;
border:1px solid #000;
box-sizing:border-box;
cursor:pointer;
}

.key:active{
background:#ddd;
}

/* DRUM PADS */

.pads{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-top:15px;
}

.pad{
background:#00e0ff;
padding:25px;
text-align:center;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.pad:active{
transform:scale(0.95);
}

/* CONTROLS */

.controls{
margin-top:15px;
}

button{
padding:10px 18px;
border:none;
border-radius:8px;
background:#00e0ff;
font-weight:bold;
cursor:pointer;
margin-right:10px;
}

button:hover{
background:#00bcd4;
}

footer{
text-align:center;
padding:30px;
opacity:0.7;
}

.status{
margin-top:10px;
font-size:14px;
opacity:0.8;
}

</style>
</head>

<body>

<header>🎵 Web Music Studio</header>

<div class="studio">

<!-- PIANO -->
<div class="panel">
<h2>Piano</h2>

<div class="piano" id="piano">
<div class="key" data-note="261.63"></div>
<div class="key" data-note="293.66"></div>
<div class="key" data-note="329.63"></div>
<div class="key" data-note="349.23"></div>
<div class="key" data-note="392.00"></div>
<div class="key" data-note="440.00"></div>
<div class="key" data-note="493.88"></div>
</div>

<p>Touches: Do Re Mi Fa Sol La Si</p>

</div>

<!-- DRUMS -->
<div class="panel">
<h2>Batterie</h2>

<div class="pads">
<div class="pad" data-drum="kick">Kick</div>
<div class="pad" data-drum="snare">Snare</div>
<div class="pad" data-drum="hihat">HiHat</div>
<div class="pad" data-drum="clap">Clap</div>
</div>

</div>

<!-- RECORDER -->
<div class="panel">
<h2>Enregistrement</h2>

<div class="controls">
<button onclick="startRecording()">Start</button>
<button onclick="stopRecording()">Stop</button>
</div>

<div class="status" id="recStatus">Statut : prêt</div>

<a id="downloadLink" style="display:block;margin-top:15px"></a>

</div>

</div>

<footer>Studio musical navigateur compatible GitHub Pages</footer>

<script>

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

const mediaDest = audioCtx.createMediaStreamDestination();
const recorder = new MediaRecorder(mediaDest.stream);
let chunks = [];

const statusText = document.getElementById("recStatus");

recorder.ondataavailable = e => chunks.push(e.data);

recorder.onstop = () => {

let blob = new Blob(chunks,{type:'audio/webm'});
let url = URL.createObjectURL(blob);

let link = document.getElementById("downloadLink");
link.href = url;
link.download = "music.webm";
link.innerText = "Télécharger l'enregistrement";

chunks = [];
statusText.innerText = "Statut : enregistrement terminé";

}

function connect(node){
node.connect(audioCtx.destination);
node.connect(mediaDest);
}

/* PIANO */

document.querySelectorAll('.key').forEach(key=>{

key.addEventListener('mousedown',()=>{

let freq = parseFloat(key.dataset.note);

let osc = audioCtx.createOscillator();
let gain = audioCtx.createGain();

osc.type='sine';
osc.frequency.value=freq;

gain.gain.value=0.3;

osc.connect(gain);
connect(gain);

osc.start();

setTimeout(()=>{
osc.stop();
},500);

});

});

/* DRUMS */

function playNoise(duration,filterFreq){

let bufferSize = audioCtx.sampleRate * duration;
let buffer = audioCtx.createBuffer(1,bufferSize,audioCtx.sampleRate);
let data = buffer.getChannelData(0);

for(let i=0;i<bufferSize;i++){
data[i] = Math.random()*2-1;
}

let noise = audioCtx.createBufferSource();
noise.buffer = buffer;

let filter = audioCtx.createBiquadFilter();
filter.type="lowpass";
filter.frequency.value = filterFreq;

noise.connect(filter);
connect(filter);

noise.start();

}

function kick(){

let osc = audioCtx.createOscillator();
let gain = audioCtx.createGain();

osc.frequency.setValueAtTime(150,audioCtx.currentTime);
osc.frequency.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.5);

gain.gain.setValueAtTime(1,audioCtx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.5);

osc.connect(gain);
connect(gain);

osc.start();
osc.stop(audioCtx.currentTime+0.5);

}

function snare(){ playNoise(0.2,1000); }
function hihat(){ playNoise(0.05,8000); }
function clap(){ playNoise(0.15,3000); }


document.querySelectorAll('.pad').forEach(p=>{

p.onclick=()=>{

let drum = p.dataset.drum;

if(drum==='kick') kick();
if(drum==='snare') snare();
if(drum==='hihat') hihat();
if(drum==='clap') clap();

}

});

/* RECORDING (FIXED STATE HANDLING) */

function startRecording(){

if(recorder.state === "recording"){
console.warn("Recorder already recording");
statusText.innerText = "Statut : déjà en enregistrement";
return;
}

recorder.start();
statusText.innerText = "Statut : enregistrement en cours";

}

function stopRecording(){

if(recorder.state !== "recording"){
console.warn("Recorder not recording");
statusText.innerText = "Statut : aucun enregistrement actif";
return;
}

recorder.stop();

}

/* SIMPLE TESTS (console) */

function runTests(){
console.log("Running basic recorder tests...");

console.assert(recorder.state === "inactive","Recorder should start inactive");

startRecording();
console.assert(recorder.state === "recording","Recorder should be recording after start");

startRecording();
console.assert(recorder.state === "recording","Recorder should still be recording after duplicate start");

stopRecording();

setTimeout(()=>{
console.assert(recorder.state === "inactive","Recorder should return to inactive after stop");
console.log("Tests finished");
},500);
}

// Run tests automatically after load
window.addEventListener("load",()=>{
setTimeout(runTests,1000);
});

</script>

</body>
</html>
